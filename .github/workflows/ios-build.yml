      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
          IOS_PATH: ${{ inputs.ios_path }}
          SCHEME: ${{ inputs.scheme }}
          PROJECT_TYPE: ${{ steps.detect.outputs.type }}
          USE_SIGNING: ${{ inputs.use_signing }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          set -e

          echo "Project type: $PROJECT_TYPE"
          echo "iOS path: $IOS_PATH"
          echo "Configuration: $CONFIGURATION"
          echo "Use signing: $USE_SIGNING"

          cd "$IOS_PATH"

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -1)

          echo "Detected workspace: $WORKSPACE"
          echo "Detected project: $PROJECT"

          if [ -f "Podfile" ]; then
            echo "Running pod install..."
            pod install
            WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
            echo "Workspace after pod install: $WORKSPACE"
          fi

          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"
          mkdir -p "${GITHUB_WORKSPACE}/build"

          if [ "$PROJECT_TYPE" = "flutter" ]; then
            cd ..
            if [ "$CONFIGURATION" = "Debug" ]; then
              echo "Building Flutter iOS Debug..."
              flutter build ios --debug --no-codesign
            else
              echo "Building Flutter iOS Release..."
              flutter build ios --release --no-codesign
            fi

            echo "Looking for Flutter .app output..."
            find "${GITHUB_WORKSPACE}/build/ios" -name "*.app" -type d || true

            APP_PATH=$(find "${GITHUB_WORKSPACE}/build/ios/iphoneos" -name "*.app" -type d | head -1)

          elif [ "$PROJECT_TYPE" = "reactnative" ] || [ "$PROJECT_TYPE" = "expo" ]; then
            echo "Building React Native / Expo iOS ($CONFIGURATION)..."

            if [ -z "$SCHEME" ]; then
              if [ -n "$WORKSPACE" ]; then
                SCHEME=$(basename "$WORKSPACE" .xcworkspace)
              elif [ -n "$PROJECT" ]; then
                SCHEME=$(basename "$PROJECT" .xcodeproj)
              fi
            fi

            echo "Using scheme: $SCHEME"

            if [ -n "$WORKSPACE" ]; then
              xcodebuild \
                -workspace "$WORKSPACE" \
                -scheme "$SCHEME" \
                -configuration "$CONFIGURATION" \
                -destination 'generic/platform=iOS' \
                -derivedDataPath "$DERIVED_DATA_PATH" \
                CODE_SIGNING_ALLOWED=NO \
                COMPILER_INDEX_STORE_ENABLE=NO \
                -quiet build
            elif [ -n "$PROJECT" ]; then
              xcodebuild \
                -project "$PROJECT" \
                -scheme "$SCHEME" \
                -configuration "$CONFIGURATION" \
                -destination 'generic/platform=iOS' \
                -derivedDataPath "$DERIVED_DATA_PATH" \
                CODE_SIGNING_ALLOWED=NO \
                COMPILER_INDEX_STORE_ENABLE=NO \
                -quiet build
            else
              echo "Error: No .xcworkspace or .xcodeproj found"
              exit 1
            fi

            echo "Looking for React Native / Expo .app output..."
            find "$DERIVED_DATA_PATH" -name "*.app" -type d || true

            APP_PATH=$(find "$DERIVED_DATA_PATH/Build/Products/${CONFIGURATION}-iphoneos" -name "*.app" -type d | head -1)

          else
            echo "Building native iOS app..."

            if [ -z "$SCHEME" ]; then
              if [ -n "$WORKSPACE" ]; then
                SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | grep -v -E "^[[:space:]]*Pods-" | head -1 | xargs)
                if [ -z "$SCHEME" ]; then
                  SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | head -1 | xargs)
                fi
              elif [ -n "$PROJECT" ]; then
                SCHEME=$(xcodebuild -project "$PROJECT" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | head -1 | xargs)
              fi
            fi

            echo "Using scheme: $SCHEME"

            if [ "$USE_SIGNING" = "true" ]; then
              if [ -n "$WORKSPACE" ]; then
                xcodebuild \
                  -workspace "$WORKSPACE" \
                  -scheme "$SCHEME" \
                  -configuration "$CONFIGURATION" \
                  -destination 'generic/platform=iOS' \
                  -derivedDataPath "$DERIVED_DATA_PATH" \
                  -archivePath "${GITHUB_WORKSPACE}/build/App.xcarchive" \
                  archive
              elif [ -n "$PROJECT" ]; then
                xcodebuild \
                  -project "$PROJECT" \
                  -scheme "$SCHEME" \
                  -configuration "$CONFIGURATION" \
                  -destination 'generic/platform=iOS' \
                  -derivedDataPath "$DERIVED_DATA_PATH" \
                  -archivePath "${GITHUB_WORKSPACE}/build/App.xcarchive" \
                  archive
              else
                echo "Error: No .xcworkspace or .xcodeproj found"
                exit 1
              fi
            else
              if [ -n "$WORKSPACE" ]; then
                xcodebuild \
                  -workspace "$WORKSPACE" \
                  -scheme "$SCHEME" \
                  -configuration "$CONFIGURATION" \
                  -destination 'generic/platform=iOS' \
                  -derivedDataPath "$DERIVED_DATA_PATH" \
                  COMPILER_INDEX_STORE_ENABLE=NO \
                  DEBUG_INFORMATION_FORMAT=dwarf \
                  ONLY_ACTIVE_ARCH=YES \
                  SWIFT_ENABLE_COMPILE_CACHE=YES \
                  CLANG_ENABLE_COMPILE_CACHE=YES \
                  CODE_SIGNING_ALLOWED=NO \
                  -quiet build
              elif [ -n "$PROJECT" ]; then
                xcodebuild \
                  -project "$PROJECT" \
                  -scheme "$SCHEME" \
                  -configuration "$CONFIGURATION" \
                  -destination 'generic/platform=iOS' \
                  -derivedDataPath "$DERIVED_DATA_PATH" \
                  COMPILER_INDEX_STORE_ENABLE=NO \
                  DEBUG_INFORMATION_FORMAT=dwarf \
                  ONLY_ACTIVE_ARCH=YES \
                  SWIFT_ENABLE_COMPILE_CACHE=YES \
                  CLANG_ENABLE_COMPILE_CACHE=YES \
                  CODE_SIGNING_ALLOWED=NO \
                  -quiet build
              else
                echo "Error: No .xcworkspace or .xcodeproj found"
                exit 1
              fi
            fi

            if [ "$USE_SIGNING" = "true" ]; then
              cd "${GITHUB_WORKSPACE}"

              printf '%s\n' \
                '<?xml version="1.0" encoding="UTF-8"?>' \
                '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
                '<plist version="1.0">' \
                '<dict>' \
                '    <key>method</key>' \
                '    <string>development</string>' \
                '    <key>signingStyle</key>' \
                '    <string>automatic</string>' \
                '</dict>' \
                '</plist>' > ExportOptions.plist

              xcodebuild -exportArchive \
                -archivePath build/App.xcarchive \
                -exportOptionsPlist ExportOptions.plist \
                -exportPath build/export

              mv build/export/*.ipa "build/$BUILD_ID.ipa"
              echo "Created signed IPA: build/$BUILD_ID.ipa"
              exit 0
            fi

            echo "Looking for native .app output..."
            find "$DERIVED_DATA_PATH" -name "*.app" -type d || true

            APP_PATH=$(find "$DERIVED_DATA_PATH/Build/Products/${CONFIGURATION}-iphoneos" -name "*.app" -type d | head -1)
          fi

          echo "Resolved APP_PATH: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find built .app"
            exit 1
          fi

          cd "${GITHUB_WORKSPACE}"
          rm -rf build/Payload
          mkdir -p build/Payload

          echo "Copying app into Payload..."
          cp -R "$APP_PATH" build/Payload/

          echo "Creating unsigned IPA..."
          cd build
          zip -rq "$BUILD_ID.ipa" Payload
          rm -rf Payload
          cd ..

          echo "Created IPA:"
          ls -lh "build/$BUILD_ID.ipa"

      - name: Debug IPA
        run: |
          echo "Current directory:"
          pwd
          echo "All IPA files:"
          find . -name "*.ipa" -type f -ls || true
          echo "All APP files:"
          find . -name "*.app" -type d || true
          echo "Root build folder:"
          ls -la build || true
          echo "Flutter build folder:"
          ls -la build/ios || true
          echo "DerivedData products:"
          find DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null || true

      - name: Check IPA exists
        run: |
          echo "Verifying IPA exists..."
          IPA_COUNT=$(find . -name "*.ipa" -type f | wc -l | xargs)
          if [ "$IPA_COUNT" = "0" ]; then
            echo "No IPA file was generated."
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            **/*.ipa
          retention-days: 7
          if-no-files-found: error
